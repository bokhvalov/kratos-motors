name: Deploy GitHub Pages

on:
  push:
    branches: ['main', 'master']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Public base path and site URL
        id: pub
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          VB="${{ vars.VITE_BASE_PATH }}"
          VS="${{ vars.VITE_SITE_URL }}"
          if [ -n "$VB" ] && [ -n "$VS" ]; then
            echo "base_path=$VB" >> "$GITHUB_OUTPUT"
            echo "site_url=$VS" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$REPO" = "$OWNER.github.io" ]; then
            echo "base_path=/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io/" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/${REPO}/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci

      - run: npm run lint

      - run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.pub.outputs.base_path }}
          VITE_SITE_URL: ${{ steps.pub.outputs.site_url }}

      - name: SPA fallback (refresh на /about и т.д.)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
